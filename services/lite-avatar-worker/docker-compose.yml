services:
  lite-avatar-worker:
    build: .
    container_name: lite-avatar-worker
    ports:
      - "8080:8080"
    volumes:
      - lite-avatar-models:/app/lite-avatar/weights
      - lite-avatar-cache:/tmp/lite-avatar-videos
      - ./avatars:/app/avatars:ro
    environment:
      - PORT=8080
      - VIDEO_CACHE_DIR=/tmp/lite-avatar-videos
      - LOG_LEVEL=INFO
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '4'
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

volumes:
  lite-avatar-models:
  lite-avatar-cache:
