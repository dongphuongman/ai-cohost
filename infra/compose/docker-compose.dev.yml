services:
  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: cohost_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../docker/init-extensions.sql:/docker-entrypoint-initdb.d/01-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  # Self-hosted digital human worker. Opt-in only — start with:
  #   docker compose --profile lite-avatar up -d lite-avatar-worker
  # The profile guard keeps it out of the default `docker compose up` since
  # it needs to download ~5-8GB of model weights on first boot.
  lite-avatar-worker:
    build:
      context: ../../services/lite-avatar-worker
      dockerfile: Dockerfile
    container_name: cohost-lite-avatar
    ports:
      # Host 8088 → container 8080. Adminer already owns host 8080.
      - "8088:8080"
    volumes:
      - lite-avatar-models:/app/lite-avatar/weights
      - lite-avatar-cache:/tmp/lite-avatar-videos
      - ../../services/lite-avatar-worker/avatars:/app/avatars:ro
    environment:
      - LOG_LEVEL=INFO
      - VIDEO_CACHE_DIR=/tmp/lite-avatar-videos
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
        reservations:
          cpus: '4'
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    profiles:
      - lite-avatar

volumes:
  pgdata:
  redisdata:
  lite-avatar-models:
  lite-avatar-cache:
